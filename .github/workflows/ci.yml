# hermes-dashboard CI/CD Pipeline
# 自动测试 + 代码质量门禁
name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=services --cov=security --cov=routers --cov-report=term --cov-fail-under=70
        env:
          HERMES_HOME: ${{ github.workspace }}

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
      - name: Verify images
        run: docker images --filter "reference=hermes-dashboard*" --format "{{.Repository}}:{{.Tag}}"

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Python syntax
        run: python scripts/check_syntax.py
      - name: Check .gitignore
        run: |
          for f in .env auth.json node_modules "*.db"; do
            if git check-ignore $f 2>/dev/null; then echo "OK $f"; else echo "MISSING $f"; fi
          done
